version: 2

conda:
  environment: environment.yml

build:
  os: ubuntu-22.04
  tools:
    python: "miniconda-latest"
  apt_packages:
    - libglx-mesa0
    - libgl1
    - xvfb
  jobs:
    build:
      html:
        # this may need the --execute flag to run the notebooks
        - cd book && jupyter-book build --html
        - cp -r book/_build/html/* $READTHEDOCS_OUTPUT/html/

formats: []
