version: 2

# conda:
#   environment: environment.yml

build:
  os: ubuntu-22.04
  tools:
    python: "miniconda-latest"
    nodejs: "20"
  apt_packages:
    - libglx-mesa0
    - libgl1
    - xvfb
  commands:
    - npm install -g mystmd
    - conda env create --name festim-workshop-jupyter2 --file environment.yml
    - mkdir -p $READTHEDOCS_OUTPUT/html
    - conda run -n festim-workshop-jupyter2 bash -c "cd book/ && BASE_URL="/$READTHEDOCS_LANGUAGE/$READTHEDOCS_VERSION" myst build --html"
    - cp -a book/_build/html/. "$READTHEDOCS_OUTPUT/html" && rm -r docs/_build