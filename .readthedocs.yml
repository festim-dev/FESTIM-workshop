version: 2

# conda:
#   environment: environment.yml

build:
  os: ubuntu-22.04
  tools:
    python: "miniconda-latest"
    nodejs: "20"
  apt_packages:
    - libglx-mesa0
    - libgl1
    - xvfb
  commands:
    - npm install -g mystmd
    # - pip install "jupyter-book>=2.0.0a0"
    - conda env create --name festim-workshop-jupyter2 --file environment.yml
    - mkdir -p $READTHEDOCS_OUTPUT/site
    - ls
    - conda run -n festim-workshop-jupyter2 bash -c "cd book/ && BASE_URL="127.0.0.1" myst build --site"
    - cp -a book/_build/site/. "$READTHEDOCS_OUTPUT/site" && rm -r book/_build